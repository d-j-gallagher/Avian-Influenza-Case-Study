<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e3c72;
            color: white;
            font-family: Arial, sans-serif;
        }
        
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 30px;
        }
        
        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
        }
        
        button:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦠 Can you see this?</h1>
        <p style="font-size: 20px; margin-bottom: 30px;">If you can see this text, the file is loading correctly.</p>
        <button onclick="alert('Button works! Click OK, then I will show the next page.'); document.getElementById('page2').style.display='flex'; document.getElementById('page1').style.display='none';">
            Click Me to Test
        </button>
    </div>
    
    <div id="page2" style="display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px;">
        <h1>✅ It Works!</h1>
        <p style="font-size: 20px;">The button worked. Now I can build the full simulation for you.</p>
    </div>
    
    <script>
        console.log("JavaScript is working!");
    </script>
</body>
</html>
